<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <title>exemplo DOM</title>
   <script src="scripts.js" defer></script>
</head>
<body>
    <p id="texto"> Este é um paragráfo.</p> 
    
    <div id="pai">
        <p id="filho1">Filho 1</p>
        <p id="filho2">Filho 2</p>
    </div>

    <div id="resultadoFilhos"></div>

    <!--Capturando o clique de um botão-->
    <button id="botao1">Clique aqui</button>
    <div id="resultado1"></div>

    <!--Lendo o conteúdo de uma caixa de texto-->
    <input type="text" id="textoInput" 
                       placeholder="Digite algo">
    <button id="botao2">Exibir texto</button>
    <div id="resultado2"></div>

    <!--Lendo o valor de um select-->
    <select id="cidades">
        <option value="Teresina">Teresina</option>
        <option value="José de Freitas">José de Freitas</option>
        <option value="União">União</option>
        <option value="Parnaíba">Parnaíba</option>
    </select>

    <button id="botaoCidade"> Mostrar cidade</button>
    <div id="resultadoCidade"></div>

    <!--Alterando a cor de fundo de uma página-->
    <input type="color" id="inputCor">
    <button id="botaoCor">Mudar cor de fundo</button>

    <br>

    <!--Lendo o valor de um checkbox-->
    <label>
        <input type="checkbox" id="interesse" value="Sim">
        Quero receber novidades
    </label>
    <br>
    <button id="botaoInteresse">Verificar interesse</button>
    <div id="saidaInteresse"></div>

    <!--Exemplo com querySelector-->
    <p>item 1</p>

    <p>item 2</p>

    <p>item 3</p>

</body>
</html>
